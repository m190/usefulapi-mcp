<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="#0e0e11"/>
  <circle cx="230" cy="600" r="340" fill="url(#glow)"/>

  <!-- icon 200x200, vertically centered (y 500..700) -->
  <g transform="translate(120,500) scale(0.390625)">
    <rect width="512" height="512" rx="114" fill="url(#teal)"/>
    <g fill="#ffffff">
      <circle cx="169" cy="256" r="61"/><circle cx="343" cy="256" r="61"/>
      <rect x="169" y="223" width="174" height="66" rx="33"/>
    </g>
  </g>

  <text x="366" y="585" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="80" font-weight="700" letter-spacing="-2">
    <tspan fill="#ffffff">useful</tspan><tspan fill="#2dd4bf">api</tspan>
  </text>
  <text x="368" y="640" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="29" fill="#a1a1ac">Hosted MCP servers for the tools you use.</text>
  <text x="368" y="690" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#2dd4bf">usefulapi.io</text>
</svg>
