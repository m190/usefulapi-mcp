<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>usefulapi — hosted MCP servers</title>
<meta name="description" content="Hosted MCP servers for the tools you already use. Connect from Claude, Cursor, or any MCP client.">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta property="og:title" content="usefulapi — hosted MCP servers">
<meta property="og:description" content="Hosted MCP servers for the tools you already use. Connect from Claude, Cursor, or any MCP client.">
<meta property="og:image" content="https://usefulapi.io/og.png">
<meta property="og:url" content="https://usefulapi.io">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://usefulapi.io/og.png">
<style>
  :root {
    --bg: #fbfbfa; --fg: #1a1a1a; --muted: #6b6b6b; --card: #ffffff;
    --border: #e6e6e3; --accent: #4f46e5; --chip: #f0f0ee;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f11; --fg: #ececec; --muted: #9a9a9a; --card: #17171a;
      --border: #262629; --accent: #8b83f8; --chip: #212125;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  a { color: inherit; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 72px 24px 96px; }
  .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .brand .mark { width: 44px; height: 44px; border-radius: 11px; flex: none; }
  header h1 { font-size: 40px; letter-spacing: -0.02em; margin: 0; }
  header p { color: var(--muted); font-size: 18px; margin: 0 0 40px; max-width: 44ch; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; text-decoration: none; color: inherit; display: flex; flex-direction: column;
    gap: 10px; transition: border-color .15s, transform .15s; }
  a.card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card.soon { opacity: .8; }
  .card .top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card h2 { font-size: 19px; margin: 0; }
  .card p { margin: 0; color: var(--muted); font-size: 14px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .chip { background: var(--chip); border-radius: 999px; padding: 3px 10px; font-size: 12px; color: var(--muted); }
  .chip.live { color: #12873f; }
  .chip.soon { color: var(--accent); }
  @media (prefers-color-scheme: dark) { .chip.live { color: #5fd68a; } }
  footer { margin-top: 56px; color: var(--muted); font-size: 13px; }
  footer a { color: var(--muted); }
  code { background: var(--chip); padding: 2px 6px; border-radius: 6px; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><img class="mark" src="/icon.svg" width="44" height="44" alt=""><h1>usefulapi</h1></div>
    <p id="tagline">Hosted MCP servers for the tools you already use.</p>
  </header>
  <main class="grid" id="grid"></main>
  <footer>
    Connect from Claude, Cursor, or any MCP client. &nbsp;·&nbsp;
    <a href="/privacy">Privacy</a> &nbsp;·&nbsp; <a href="/terms">Terms</a> &nbsp;·&nbsp;
    <a href="mailto:support@usefulapi.io">support@usefulapi.io</a>
  </footer>
</div>
<script>
  // Single source of truth = /manifest.json (same file build.mjs uses for product pages).
  // Derived from the enriched schema (tools[]/pricing[]) so tiles never carry stale counts.
  const priceText = function (p) {
    if (!p || !p.monthly || p.monthly === "$0") return "$0";
    return [p.monthly && p.monthly + "/mo", p.yearly && p.yearly + "/yr"].filter(Boolean).join(" · ");
  };
  const tier = function (s, re) { return (s.pricing || []).find(function (p) { return re.test(p.plan); }); };
  fetch('/manifest.json').then(function (r) { return r.json(); }).then(function (MANIFEST) {
    document.getElementById('tagline').textContent = MANIFEST.portal.tagline;
    const grid = document.getElementById('grid');
    for (const s of MANIFEST.servers) {
      const live = s.status === "live";
      const el = document.createElement('a');
      el.className = 'card' + (live ? '' : ' soon');
      el.href = '/' + s.slug;
      const statusChip = live
        ? '<span class="chip live">live</span>'
        : '<span class="chip soon">launching soon</span>';
      const free = tier(s, /free/i), pro = tier(s, /pro/i);
      const toolN = (s.tools || []).length;
      el.innerHTML = `
        <div class="top"><h2>${s.name}</h2>${statusChip}</div>
        <p>${s.description}</p>
        <div class="chips">
          <span class="chip">${toolN} tools</span>
          <span class="chip">${s.category}</span>
          ${free ? `<span class="chip">Free ${free.limit}</span>` : ''}
          ${pro ? `<span class="chip">Pro ${priceText(pro)}</span>` : ''}
        </div>`;
      grid.appendChild(el);
    }
  });
</script>
</body>
</html>
